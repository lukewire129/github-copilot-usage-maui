name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Publish Windows app
        run: >
          dotnet publish copilot-usage-maui.csproj
          -f net9.0-windows10.0.19041.0
          -c Release
          -r win-x64
          --self-contained true
          -o publish/windows

      - name: Compress published output
        run: Compress-Archive -Path publish/windows/* -DestinationPath copilot-usage-maui-${{ github.ref_name }}-windows.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: copilot-usage-maui-${{ github.ref_name }}-windows.zip
          generate_release_notes: true
